# This workflow is adapted from TerraFirmaGreg-Team/Core-Modern
# Original: https://github.com/TerraFirmaGreg-Team/Core-Modern/blob/dev/.github/workflows/build.yml

name: Project Build
run-name: '[📦]: Project Build #${{ github.run_number }}'

on:
  push:
    branches:
      - dev
    tags:
      - 'v[0-9]*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  info:
    name: '[🖥️] Project Info'
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    outputs:
      version: ${{ steps.check.outputs.version }}
      version_type: ${{ steps.check.outputs.version_type }}
      game_version: ${{ steps.check.outputs.game_version }}
      java_version: ${{ steps.check.outputs.java_version }}
      loaders: ${{ steps.check.outputs.loaders }}
      make_release: ${{ steps.check.outputs.make_release }}
    steps:
      - name: '[📦] Checkout'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: '[🔍] Check required files and folders'
        uses: andstor/file-existence-action@v3.1.0
        with:
          fail: true
          ignore_case: true
          files: build.gradle.kts, gradle.properties, LICENSE.txt, README.md, src, devenv.nix

      - name: '[📥] Get base version from devenv.nix'
        id: base_version
        shell: bash
        run: |
          BASE_VERSION=$(grep -oP 'MOD_VERSION\s*=\s*"\K[^"]+' devenv.nix)
          echo "base=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Base version: $BASE_VERSION"

      - name: '[📥] Build final version and detect trigger type'
        id: version
        shell: bash
        run: |
          IS_RELEASE="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FINAL_VERSION="${{ github.event.inputs.version }}"
            IS_RELEASE="true"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            FINAL_VERSION="${GITHUB_REF_NAME#v}"
            IS_RELEASE="true"
          else
            BASE="${{ steps.base_version.outputs.base }}"
            SHORT_SHA="${GITHUB_SHA:0:7}"
            FINAL_VERSION="${BASE}-${SHORT_SHA}-${{ github.run_number }}-dev"
          fi

          echo "version=$FINAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"

      - name: '[🔍] Determine version type'
        id: version_type
        shell: bash
        run: |
          IS_RELEASE="${{ steps.version.outputs.is_release }}"

          if [[ "$IS_RELEASE" == "false" ]]; then
            echo "type=unreleased" >> "$GITHUB_OUTPUT"
          else
            VERSION="${{ steps.version.outputs.version }}"
            if [[ "$VERSION" == *-alpha* ]]; then
              echo "type=alpha" >> "$GITHUB_OUTPUT"
            elif [[ "$VERSION" == *-beta* ]]; then
              echo "type=beta" >> "$GITHUB_OUTPUT"
            elif [[ "$VERSION" == *-rc* ]]; then
              echo "type=beta" >> "$GITHUB_OUTPUT"
            else
              echo "type=release" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: '[🔍] Check'
        id: check
        shell: bash
        run: |
          echo "version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "version_type=${{ steps.version_type.outputs.type }}" >> "$GITHUB_OUTPUT"
          echo "make_release=${{ steps.version.outputs.is_release }}" >> "$GITHUB_OUTPUT"
          echo "game_version=1.21.1" >> "$GITHUB_OUTPUT"
          echo "java_version=21" >> "$GITHUB_OUTPUT"
          echo "loaders=neoforge" >> "$GITHUB_OUTPUT"

      - name: '[📝] Generate Build Summary'
        uses: WcAServices/markdown-template-action@v1.1.1
        with:
          template: |
            ## 📊 Build Information

            ### Project Info
            | Parameter | Value |
            |-----------|-------|
            | 📃 **Version** | `${{ steps.check.outputs.version }}` |
            | 📃 **Release Type** | `${{ steps.check.outputs.version_type }}` |
            | 📃 **Game Versions** | `${{ steps.check.outputs.game_version }}` |
            | 📃 **Loaders** | `${{ steps.check.outputs.loaders }}` |

            ### Build Decision
            | Parameter | Value |
            |-----------|-------|
            | 📃 **Trigger** | `${{ github.ref_type }}` |
            | 📃 **Make Release** | `${{ steps.check.outputs.make_release }}` |

  build:
    name: '[📦] Build Project'
    needs: [info]
    runs-on: ubuntu-latest
    steps:
      - name: '[📦] Checkout'
        uses: actions/checkout@v7

      - name: '[📁] Setup Java'
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: ${{ needs.info.outputs.java_version }}
          cache: gradle

      - name: '[📁] Prepare artifact'
        run: |
          chmod +x gradlew
          ./gradlew build
          ls -la build/libs/
        env:
          VERSION: ${{ needs.info.outputs.version }}

      - name: '[🚀] Upload Artifact'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ needs.info.outputs.version }}
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    name: '[🚀] Release'
    needs: [info, build]
    runs-on: ubuntu-latest
    if: ${{ needs.info.outputs.make_release == 'true' }}
    steps:
      - name: '[📦] Download artifact'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.info.outputs.version }}

      - name: '[🔒] Verify artifact'
        shell: bash
        run: |
          JAR_COUNT=$(ls -1 *.jar 2>/dev/null | wc -l)
          if [ "$JAR_COUNT" -eq 0 ]; then
            echo "::error::No jar files found"
            ls -la
            exit 1
          fi
          echo "✅ Found $JAR_COUNT jar(s):"
          ls -1 *.jar

      - name: '[🚀] Release to Modrinth, CurseForge & GitHub'
        uses: Xikaro/game-publish@3.3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-fail-mode: skip

          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-fail-mode: skip

          github-name: ${{ github.ref_name }}
          github-tag: ${{ github.ref_name }}
          github-generate-changelog: true
          github-draft: false
          github-prerelease: ${{ needs.info.outputs.version_type != 'release' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: '*.jar'
          name: ${{ needs.info.outputs.version }}
          version: ${{ needs.info.outputs.version }}
          version-type: ${{ needs.info.outputs.version_type }}

          loaders: ${{ needs.info.outputs.loaders }}
          game-versions: ${{ needs.info.outputs.game_version }}
          game-version-filter: none
          java: ${{ needs.info.outputs.java_version }}

          retry-attempts: 2
          retry-delay: 10000
          fail-mode: fail

      - name: '[📝] Checkout dev branch to bump MOD_VERSION'
        uses: actions/checkout@v7
        with:
          ref: dev
          fetch-depth: 0

      - name: '[📝] Bump MOD_VERSION in devenv.nix'
        shell: bash
        run: |
          NEW_VERSION="${{ needs.info.outputs.version }}"
          echo "Bumping MOD_VERSION to $NEW_VERSION"
          sed -i 's/^    MOD_VERSION = ".*"/    MOD_VERSION = "'"$NEW_VERSION"'"/' devenv.nix
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add devenv.nix
          # Only commit if there's an actual change
          git diff --staged --quiet || git commit -m "Bump MOD_VERSION to $NEW_VERSION"
          git push
